<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 100" width="240" height="200">
  <!--
    입시 AI 상담사 — Blue Whale Mascot  v2
    ======================================
    Groups for editing in Figma / Inkscape / browser:
      #body-path   — smooth single bezier path for the whole body silhouette
      #belly       — lighter underbelly, clearly at the bottom
      #tail        — two large curved fan fins
      #flipper     — bottom pectoral fin
      #blowhole    — oval on head top
      #face        — eye + smile
      #hat         — mortarboard: brim + cap + tassel + button

    Palette
      Body         #60A5FA   (blue-400)
      Body shadow  #3B82F6   (blue-500) — tail, flipper, blowhole
      Belly        #E0F2FE   (sky-100)  — clearly bottom / underbelly
      Hat          #1E293B   (slate-800)
      Tassel       #FBBF24   (amber-400)
      Eye white    #FFFFFF
      Eye pupil    #0F172A   (slate-950)
      Eye shine    #FFFFFF
  -->

  <!-- ── Tail (behind body) ──────────────────────────────────────────── -->
  <g id="tail">
    <!-- Upper lobe — large sweeping curve -->
    <path d="M 82 52
             C 90 42, 108 36, 104 46
             C 101 52, 94 54, 88 55
             Z"
          fill="#3B82F6"/>
    <!-- Lower lobe — matching sweep -->
    <path d="M 82 62
             C 90 72, 108 80, 104 70
             C 101 64, 94 61, 88 60
             Z"
          fill="#3B82F6"/>
    <!-- Tail root notch -->
    <path d="M 82 52 Q 85 57, 82 62 Q 80 57 82 52 Z"
          fill="#2563EB"/>
  </g>

  <!-- ── Body — smooth single bezier path ──────────────────────────── -->
  <g id="body-path">
    <!--
      Body outline: starts at tail join, sweeps around the head,
      comes back along the belly, back to tail.
      Whale faces LEFT (head on left side).
    -->
    <path d="
      M 83 57
      C 80 44, 68 37, 55 36
      C 42 35, 28 38, 18 46
      C 10 52, 10 62, 18 68
      C 28 76, 42 79, 55 79
      C 68 79, 80 73, 83 60
      Z"
          fill="#60A5FA"/>

    <!-- ── Belly patch — bottom quarter only ────────────────────────── -->
    <g id="belly">
      <path d="
        M 40 77
        C 48 80, 60 80, 70 77
        C 68 73, 62 71, 55 71
        C 48 71, 43 73, 40 77
        Z"
            fill="#E0F2FE"/>
    </g>
  </g>

  <!-- ── Pectoral flipper (bottom fin) ─────────────────────────────── -->
  <g id="flipper">
    <path d="M 52 78 C 44 84, 38 90, 50 88 C 57 86, 60 82, 58 78 Z"
          fill="#3B82F6"/>
  </g>

  <!-- ── Blowhole (top of head) ─────────────────────────────────────── -->
  <g id="blowhole">
    <ellipse cx="26" cy="43" rx="5" ry="3" fill="#2563EB"/>
  </g>

  <!-- ── Face ───────────────────────────────────────────────────────── -->
  <g id="face">
    <!-- Eye: large white circle, pupil, shine -->
    <circle cx="22" cy="56" r="7"   fill="white"/>
    <circle cx="23" cy="56" r="4.5" fill="#0F172A"/>
    <circle cx="25" cy="54" r="1.5" fill="white"/>
    <!-- Smile arc -->
    <path d="M 14 64 Q 20 70 30 66"
          stroke="#0F172A" stroke-width="2" fill="none"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- ── Mortarboard hat ─────────────────────────────────────────────── -->
  <!--  Positioned on head top (blowhole at 26,43), rotated −6° for personality -->
  <g id="hat" transform="translate(26,42) rotate(-6)">
    <!-- Brim (wider bar, slightly rounded ends) -->
    <rect x="-16" y="-2.5" width="32" height="6" rx="2" fill="#1E293B"/>
    <!-- Cap square (3-D look: slightly narrower than brim) -->
    <rect x="-12" y="-17" width="24" height="16" rx="1.5" fill="#1E293B"/>
    <!-- Cap highlight edge (subtle top sheen) -->
    <rect x="-12" y="-17" width="24" height="3" rx="1.5" fill="#334155" opacity="0.6"/>
    <!-- Tassel string — from right rear corner of cap -->
    <line x1="12" y1="-17" x2="18" y2="-4"
          stroke="#FBBF24" stroke-width="2" stroke-linecap="round"/>
    <!-- Tassel ball -->
    <circle cx="18" cy="-3" r="3.5" fill="#FBBF24"/>
    <!-- Button on top center -->
    <circle cx="0"  cy="-17" r="2"   fill="#FBBF24"/>
  </g>

</svg>
