<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" width="400" height="320">
  <!--
    입시 AI 상담사 — Blue Whale Mascot  v3
    ======================================
    Inspired by 🐳 — plump round body, prominent water spout, cute large eye.
    viewBox 0 0 200 160 (high-resolution coordinate space).

    Groups:
      #tail      — two fan lobes + notch
      #body      — main rounded oval
      #belly     — light underbelly patch
      #flipper   — pectoral fin
      #blowhole  — dark ellipse
      #spout     — static water drops above blowhole
      #face      — eye + smile
      #hat       — mortarboard: brim + cap + tassel + button

    Palette
      Body         #60A5FA  (blue-400)
      Body shadow  #3B82F6  (blue-500)
      Dark accent  #2563EB  (blue-600)
      Belly        #E0F2FE  (sky-100)
      Hat          #1E293B  (slate-800)
      Hat edge     #334155  (slate-700)
      Tassel       #FBBF24  (amber-400)
      Spout light  #BAE6FD  (sky-200)
      Spout mid    #7DD3FC  (sky-300)
      Eye white    #FFFFFF
      Eye pupil    #0F172A  (slate-950)
  -->

  <!-- ── Tail (behind body) ──────────────────────────────────────────── -->
  <g id="tail">
    <path d="M 148 82 C 158 62, 188 50, 182 68 C 178 78, 166 82, 156 84 Z"
          fill="#3B82F6"/>
    <path d="M 148 106 C 158 126, 188 140, 182 122 C 178 112, 166 108, 156 104 Z"
          fill="#3B82F6"/>
    <path d="M 148 82 Q 153 94, 148 106 Q 145 94 148 82 Z"
          fill="#2563EB"/>
  </g>

  <!-- ── Body — plump rounded oval ─────────────────────────────────── -->
  <g id="body">
    <path d="M 150 94
             C 148 68, 128 50, 100 46
             C 72 42, 44 50, 28 66
             C 14 80, 14 108, 28 122
             C 44 138, 72 146, 100 146
             C 128 146, 148 130, 150 106
             Z"
          fill="#60A5FA"/>
  </g>

  <!-- ── Belly patch — bottom of body ──────────────────────────────── -->
  <g id="belly">
    <path d="M 54 140 C 70 150, 100 152, 126 140
             C 124 130, 112 124, 100 124
             C 88 124, 68 128, 54 140 Z"
          fill="#E0F2FE"/>
  </g>

  <!-- ── Pectoral flipper ──────────────────────────────────────────── -->
  <g id="flipper">
    <path d="M 90 140 C 76 154, 60 164, 78 160 C 90 156, 98 148, 96 140 Z"
          fill="#3B82F6"/>
  </g>

  <!-- ── Blowhole ───────────────────────────────────────────────────── -->
  <g id="blowhole">
    <ellipse cx="42" cy="60" rx="9" ry="5.5" fill="#2563EB"/>
  </g>

  <!-- ── Static spout ───────────────────────────────────────────────── -->
  <g id="spout">
    <ellipse cx="40" cy="50" rx="4" ry="6" fill="#BAE6FD" opacity="0.9"/>
    <ellipse cx="46" cy="44" rx="3" ry="5" fill="#7DD3FC" opacity="0.75"/>
    <ellipse cx="36" cy="42" rx="3" ry="4.5" fill="#BAE6FD" opacity="0.65"/>
  </g>

  <!-- ── Face ───────────────────────────────────────────────────────── -->
  <g id="face">
    <circle cx="36" cy="88" r="13"  fill="white"/>
    <circle cx="38" cy="88" r="8.5" fill="#0F172A"/>
    <circle cx="41" cy="84" r="3"   fill="white"/>
    <path d="M 20 104 Q 32 118 50 112"
          stroke="#0F172A" stroke-width="3.5" fill="none"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- ── Mortarboard hat ─────────────────────────────────────────────── -->
  <g id="hat" transform="translate(42,56) rotate(-6)">
    <rect x="-26" y="-4"  width="52" height="9"  rx="3"   fill="#1E293B"/>
    <rect x="-20" y="-26" width="40" height="24" rx="2.5" fill="#1E293B"/>
    <rect x="-20" y="-26" width="40" height="5"  rx="2.5" fill="#334155" opacity="0.6"/>
    <line x1="20" y1="-26" x2="30" y2="-6"
          stroke="#FBBF24" stroke-width="3" stroke-linecap="round"/>
    <circle cx="30" cy="-4"  r="5.5" fill="#FBBF24"/>
    <circle cx="0"  cy="-26" r="3.5" fill="#FBBF24"/>
  </g>

</svg>
