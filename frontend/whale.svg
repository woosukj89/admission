<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="200" height="200">
  <!--
    입시 AI 상담사 — Blue Whale Mascot
    ======================================
    Editable groups (open in Figma / Inkscape / browser):
      #tail      — fan tail, behind body
      #body      — main body ellipse + round head + belly patch
      #flippers  — bottom fin
      #blowhole  — oval spout opening on head top
      #face      — eye (white+pupil+highlight) + smile arc
      #hat       — mortarboard: brim rect + cap rect + tassel + button

    Palette
      Body light  #60A5FA   (blue-400)
      Body mid    #3B82F6   (blue-500) — tail, flipper, blowhole shadow
      Belly       #BFDBFE   (blue-200)
      Hat         #1E293B   (slate-800)
      Tassel      #FBBF24   (amber-400)
      Eye white   #FFFFFF
      Eye pupil   #0F172A   (slate-950)
  -->

  <!-- ── Tail (drawn first so body overlaps it) ─────────────────── -->
  <g id="tail">
    <path d="M80,64 C86,57 97,49 92,56 C89,61 86,62 84,63Z"
          fill="#3B82F6"/>
    <path d="M80,69 C86,76 97,85 92,78 C89,73 86,71 84,70Z"
          fill="#3B82F6"/>
  </g>

  <!-- ── Body ───────────────────────────────────────────────────── -->
  <g id="body">
    <!-- Elongated torso -->
    <ellipse cx="55" cy="70" rx="30" ry="18" fill="#60A5FA"/>
    <!-- Round head (overlaps left of torso) -->
    <circle  cx="28" cy="65" r="20"           fill="#60A5FA"/>
    <!-- Belly / lighter underbelly patch -->
    <ellipse cx="33" cy="74" rx="14" ry="8"   fill="#BFDBFE"/>
  </g>

  <!-- ── Bottom flipper ─────────────────────────────────────────── -->
  <g id="flippers">
    <path d="M45,86 Q38,93 51,91 Q56,88 52,84Z" fill="#3B82F6"/>
  </g>

  <!-- ── Blowhole ────────────────────────────────────────────────── -->
  <g id="blowhole">
    <ellipse cx="27" cy="47" rx="4.5" ry="2.8" fill="#2563EB"/>
  </g>

  <!-- ── Face ───────────────────────────────────────────────────── -->
  <g id="face">
    <!-- Eye -->
    <circle cx="21"  cy="61"   r="5.5" fill="white"/>
    <circle cx="22"  cy="61"   r="3.5" fill="#0F172A"/>
    <circle cx="23.5" cy="59.5" r="1.2" fill="white"/>   <!-- gleam -->
    <!-- Smile -->
    <path d="M13,70 Q18,76 27,72"
          stroke="#0F172A" stroke-width="1.8"
          fill="none" stroke-linecap="round"/>
  </g>

  <!-- ── Mortarboard hat ─────────────────────────────────────────── -->
  <!--  translate to blowhole top (27, 46), rotate -5° for personality -->
  <g id="hat" transform="translate(27,46) rotate(-5)">
    <!-- Brim (wider flat bar) -->
    <rect x="-14" y="-2" width="28" height="5"
          rx="1.5" fill="#1E293B"/>
    <!-- Cap top (square) -->
    <rect x="-10" y="-15" width="20" height="14"
          rx="1" fill="#1E293B"/>
    <!-- Tassel string -->
    <line x1="10" y1="-15" x2="16" y2="-3"
          stroke="#FBBF24" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Tassel ball -->
    <circle cx="16" cy="-2"  r="2.8" fill="#FBBF24"/>
    <!-- Button on cap top center -->
    <circle cx="0"  cy="-15" r="1.8" fill="#FBBF24"/>
  </g>

</svg>
